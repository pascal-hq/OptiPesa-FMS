<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OptiPesa | Receipt</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <nav class="nav">
  <div class="nav-left">
    <button class="sidebar-toggle" id="sidebarToggle">☰</button>
    <h2>OptiPesa</h2>
  </div>
  <div class="nav-right">
    <!-- Notifications Bell -->
    <div style="position:relative;">
      <button class="notif-bell" id="notifBell" title="Notifications">🔔
        <span class="notif-badge" id="notifBadge"></span>
      </button>
      <div class="notif-dropdown" id="notifDropdown">
        <div class="notif-header">
          <span>Notifications</span>
          <button id="notifClear" style="font-size:12px; padding:4px 8px;">Clear all</button>
        </div>
        <div id="notifList">
          <div class="notif-empty">🔔 No notifications yet</div>
        </div>
      </div>
    </div>
    <button class="dark-toggle" id="darkToggle" onclick="toggleDarkMode()">🌙</button>
    <button type="button" onclick="logout()">Logout</button>
  </div>
</nav>

  <main style="padding: 100px 20px 40px; max-width: 500px; margin: 0 auto;">
    <div id="receiptContainer">
      <p>Loading receipt...</p>
    </div>

    <div class="receipt-actions no-print" id="receiptActions" style="display:none;">
      <button class="primary" onclick="window.print()">🖨️ Print Receipt</button>
      <button onclick="window.history.back()">← Back</button>
    </div>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/pages/receipt.js"></script>
</body>
</html>
