<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OptiPesa | Departments</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <nav class="nav">
  <div class="nav-left">
    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle menu">☰</button>
    <h2>OptiPesa</h2>
  </div>
  <div class="nav-right">
    <button class="dark-toggle" id="darkToggle" onclick="toggleDarkMode()" title="Toggle dark mode">🌙</button>
    <button type="button" onclick="logout()">Logout</button>
  </div>
</nav>

  <aside class="sidebar">
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="sales.html">Record Sale</a></li>
      <li><a href="transactions.html">Transactions</a></li>
      <li class="admin-only"><a href="departments.html" class="active">Departments</a></li>
      <li class="admin-only"><a href="employees.html">Employees</a></li>
      <li class="admin-only"><a href="services.html">Services</a></li>
      <li class="admin-only"><a href="expenses.html">Expenses</a></li>
      <li class="admin-only"><a href="finance.html">Finance</a></li>
      <li class="admin-only"><a href="analytics.html">Analytics</a></li>
      <li class="admin-only"><a href="users.html">Users</a></li>
      <li><a href="change_password.html">Change Password</a></li>
      <li class="admin-only"><a href="settings.html">Settings</a></li>
      <li class="admin-only"><a href="accounts.html">Account Activity</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <h1>Departments</h1>
    <p id="message" class="msg"></p>

    <section class="card">
      <h3>Add / Edit Department</h3>
      <form id="deptForm" class="form-grid">
        <div>
          <label for="name">Department Name</label>
          <input id="name" type="text" placeholder="e.g. Salon, Spa, Barbershop" required />
        </div>
        <div>
          <label for="description">Description (optional)</label>
          <input id="description" type="text" placeholder="e.g. Hair styling & beauty services" />
        </div>
        <div style="align-self:end; display:flex; gap:10px;">
          <button type="submit" class="primary" id="submitBtn">Save Department</button>
          <button type="button" id="cancelBtn" style="display:none;">Cancel</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h3>Department List</h3>

      <div class="filter-row" style="margin-bottom:12px;">
        <div class="filter-item">
          <label for="deptSearch">Search</label>
          <input id="deptSearch" type="text" placeholder="Search by name or description..." />
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th align="left">Name</th>
            <th align="left">Description</th>
            <th>Edit</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody id="deptBody">
          <tr><td colspan="4">Loading...</td></tr>
        </tbody>
      </table>
      <div id="deptPagination"></div>
    </section>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/pages/departments.js"></script>
</body>
</html>
