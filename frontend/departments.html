<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OptiPesa | Departments</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <nav class="nav">
    <div class="nav-left">
      <h2>OptiPesa</h2>
    </div>

    <div class="nav-right">
      <button type="button" onclick="logout()">Logout</button>
    </div>
  </nav>

  <aside class="sidebar">
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="sales.html">Record Sale</a></li>
      <li><a href="transactions.html">Transactions</a></li>

      <li class="admin-only"><a href="departments.html" class="active">Departments</a></li>
      <li class="admin-only"><a href="employees.html">Employees</a></li>
      <li class="admin-only"><a href="services.html">Services</a></li>
      <li class="admin-only"><a href="expenses.html">Expenses</a></li>
      <li class="admin-only"><a href="analytics.html">Analytics</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <h1>Departments</h1>
    <p id="message" class="msg"></p>

    <section class="card">
      <h3>Add Department</h3>

      <form id="deptForm" class="form-grid">
        <div>
          <label for="name">Department Name</label>
          <input id="name" type="text" placeholder="e.g. Salon, Spa, Barbershop" required />
        </div>

        <div>
          <label for="description">Description (optional)</label>
          <input id="description" type="text" placeholder="e.g. Hair styling & beauty services" />
        </div>

        <div style="align-self:end;">
          <button type="submit" class="primary">Save Department</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h3>Department List</h3>

      <table>
        <thead>
          <tr>
            <th align="left">Name</th>
            <th align="left">Description</th>
          </tr>
        </thead>
        <tbody id="deptBody">
          <tr><td colspan="2">Loading...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/pages/departments.js"></script>
</body>
</html>
