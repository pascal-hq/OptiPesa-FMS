<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OptiPesa | Services</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <nav class="nav">
  <div class="nav-left">
    <button class="sidebar-toggle" id="sidebarToggle" title="Toggle menu">☰</button>
    <h2>OptiPesa</h2>
  </div>
  <div class="nav-right">
    <button class="dark-toggle" id="darkToggle" onclick="toggleDarkMode()" title="Toggle dark mode">🌙</button>
    <button type="button" onclick="logout()">Logout</button>
  </div>
</nav>

  <aside class="sidebar">
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="sales.html">Record Sale</a></li>
      <li><a href="transactions.html">Transactions</a></li>
      <li class="admin-only"><a href="departments.html">Departments</a></li>
      <li class="admin-only"><a href="employees.html">Employees</a></li>
      <li class="admin-only"><a href="services.html" class="active">Services</a></li>
      <li class="admin-only"><a href="expenses.html">Expenses</a></li>
      <li class="admin-only"><a href="analytics.html">Analytics</a></li>
      <li class="admin-only"><a href="users.html">Users</a></li>
      <li><a href="change_password.html">Change Password</a></li>
      <li class="admin-only"><a href="settings.html">Settings</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <h1>Services</h1>
    <p id="message" class="msg"></p>

    <section class="card">
      <h3>Add / Edit Service</h3>
      <form id="serviceForm" class="form-grid">
        <div>
          <label for="department">Department</label>
          <select id="department" required>
            <option value="">Loading departments...</option>
          </select>
        </div>
        <div>
          <label for="name">Service Name</label>
          <input id="name" type="text" placeholder="e.g. Haircut, Massage, Facial" required />
        </div>
        <div>
          <label for="price">Price (KES)</label>
          <input id="price" type="number" step="0.01" placeholder="e.g. 500" required />
        </div>
        <div>
          <label for="description">Description (optional)</label>
          <input id="description" type="text" placeholder="e.g. 30 min haircut session" />
        </div>
        <div style="display:flex; align-items:center; gap:8px; margin-top:22px;">
          <input id="is_active" type="checkbox" checked />
          <label for="is_active" style="margin:0;">Active</label>
        </div>
        <div style="align-self:end; display:flex; gap:10px;">
          <button type="submit" class="primary" id="submitBtn">Save Service</button>
          <button type="button" id="cancelBtn" style="display:none;">Cancel</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h3>Service List</h3>

      <div class="filter-row" style="margin-bottom:12px;">
        <div class="filter-item">
          <label for="svcSearch">Search</label>
          <input id="svcSearch" type="text" placeholder="Search by name, department..." />
        </div>
        <div class="filter-item">
          <label for="svcStatusFilter">Status</label>
          <select id="svcStatusFilter">
            <option value="all">All</option>
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
      </div>

      <table>
        <thead>
          <tr>
            <th align="left">Name</th>
            <th align="left">Department</th>
            <th align="left">Price</th>
            <th align="left">Status</th>
            <th align="left">Description</th>
            <th>Edit</th>
            <th>Delete</th>
          </tr>
        </thead>
        <tbody id="servicesBody">
          <tr><td colspan="7">Loading...</td></tr>
        </tbody>
      </table>
      <div id="servicesPagination"></div>
    </section>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/pages/services.js"></script>
</body>
</html>
