<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OptiPesa | Services</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body>
  <nav class="nav">
    <div class="nav-left">
      <h2>OptiPesa</h2>
    </div>

    <div class="nav-right">
      <button type="button" onclick="logout()">Logout</button>
    </div>
  </nav>

  <aside class="sidebar">
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>
      <li><a href="sales.html">Record Sale</a></li>
      <li><a href="transactions.html">Transactions</a></li>

      <li class="admin-only"><a href="departments.html">Departments</a></li>
      <li class="admin-only"><a href="employees.html">Employees</a></li>
      <li class="admin-only"><a href="services.html" class="active">Services</a></li>
      <li class="admin-only"><a href="expenses.html">Expenses</a></li>
      <li class="admin-only"><a href="analytics.html">Analytics</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <h1>Services</h1>
    <p id="message" class="msg"></p>

    <section class="card">
      <h3>Add Service</h3>

      <form id="serviceForm" class="form-grid">
        <div>
          <label for="department">Department</label>
          <select id="department" required>
            <option value="">Loading departments...</option>
          </select>
        </div>

        <div>
          <label for="name">Service Name</label>
          <input id="name" type="text" placeholder="e.g. Haircut, Massage, Facial" required />
        </div>

        <div>
          <label for="price">Price (KES)</label>
          <input id="price" type="number" step="0.01" placeholder="e.g. 500" required />
        </div>

        <div>
          <label for="description">Description (optional)</label>
          <input id="description" type="text" placeholder="e.g. 30 min haircut session" />
        </div>

        <div style="display:flex; align-items:center; gap:8px; margin-top:22px;">
          <input id="is_active" type="checkbox" checked />
          <label for="is_active" style="margin:0;">Active</label>
        </div>

        <div style="align-self:end;">
          <button type="submit" class="primary">Save Service</button>
        </div>
      </form>
    </section>

    <section class="card">
      <h3>Service List</h3>

      <table>
        <thead>
          <tr>
            <th align="left">Name</th>
            <th align="left">Department</th>
            <th align="left">Price</th>
            <th align="left">Status</th>
            <th align="left">Description</th>
          </tr>
        </thead>

        <tbody id="servicesBody">
          <tr><td colspan="5">Loading...</td></tr>
        </tbody>
      </table>
    </section>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/pages/services.js"></script>
</body>
</html>
