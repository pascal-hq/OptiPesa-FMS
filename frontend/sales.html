<body>

    <button class="sidebar-toggle" id="sidebarToggle">☰</button>
    <h2>OptiPesa</h2>
  </div>
  <div class="nav-right">
    <!-- Notifications Bell -->
    <div style="position:relative;">
      <button class="notif-bell" id="notifBell" title="Notifications">🔔
        <span class="notif-badge" id="notifBadge"></span>
      </button>
      <div class="notif-dropdown" id="notifDropdown">
        <div class="notif-header">
          <span>Notifications</span>
          <button id="notifClear" style="font-size:12px; padding:4px 8px;">Clear all</button>
        </div>
        <div id="notifList">
          <div class="notif-empty">🔔 No notifications yet</div>
        </div>
      </div>
    </div>
    <button class="dark-toggle" id="darkToggle" onclick="toggleDarkMode()">🌙</button>
    <button type="button" onclick="logout()">Logout</button>
  </div>
</nav>

  <aside class="sidebar">
    <ul>
      <li><a href="dashboard.html">Dashboard</a></li>

      <li><a href="profile.html">Profile</a></li>
    </ul>
  </aside>

  <main class="main-content">
    <h1>Record Sale</h1>

    <form id="saleForm" class="card form-grid">
  <div>
    <label for="department">Department</label>
    <select id="department" required>
      <option value="">Loading departments...</option>
    </select>
  </div>

  <div>
    <label for="employee">Employee</label>
    <select id="employee">
      <option value="">Select department first</option>
    </select>
  </div>

  <div>
    <label for="service">Service</label>
    <select id="service">
      <option value="">Select department first</option>
    </select>
  </div>

  <div>
    <label for="customerName">Customer Name (optional)</label>
    <input id="customerName" type="text" placeholder="e.g. Jane Doe" />
  </div>

  <div>
    <label for="amount">Amount (KES)</label>
    <input id="amount" type="number" min="1" required placeholder="e.g. 1500" />
  </div>

  <div>
    <label for="channel">Payment Channel</label>
    <select id="channel">
      <option value="internal">Cash / Internal</option>
      <option value="mpesa">M-Pesa</option>
    </select>
  </div>

  <div id="mpesaPhoneDiv" style="display:none;">
    <label for="mpesaPhone">Customer M-Pesa Phone Number</label>
    <input id="mpesaPhone" type="text" placeholder="e.g. 0712345678" />
  </div>

  <div>
    <label for="reference">Reference (optional)</label>
    <input id="reference" type="text" placeholder="e.g. MPESA CODE / receipt no" />
  </div>

  <div>
    <label for="narration">Narration (optional)</label>
    <input id="narration" type="text" placeholder="e.g. Haircut + wash" />
  </div>

  <div style="align-self:end;">
    <button type="submit" class="primary">Submit Sale</button>
  </div>

  <div style="grid-column: 1 / -1;">
    <p id="message" class="msg"></p>
  </div>
</form>
  </main>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/ui.js"></script>
  <script src="assets/js/pages/sales.js"></script>
</body>
</html>
